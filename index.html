<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nicodemus — Guia Bíblico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0e0c;
      --surface:    #1a1814;
      --border:     #2e2a22;
      --gold:       #c9a84c;
      --gold-dim:   #7a6530;
      --text:       #e8e0d0;
      --text-muted: #7a7060;
      --user-bg:    #1e1c17;
      --bot-bg:     #161410;
      --radius:     14px;
      --font-serif: 'EB Garamond', Georgia, serif;
      --font-sans:  'Lato', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a2e18, #7a6530);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .header-info p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Chat area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 32px 20px;
      gap: 24px;
    }

    .welcome-icon {
      font-size: 56px;
      line-height: 1;
    }

    .welcome h2 {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 400;
      color: var(--gold);
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 380px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 520px;
      margin-top: 8px;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--font-sans);
      font-weight: 300;
      transition: border-color 0.2s, color 0.2s;
    }

    .suggestion-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 88%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.bot .msg-avatar {
      background: linear-gradient(135deg, #3a2e18, #7a6530);
    }

    .msg.user .msg-avatar {
      background: #1e2a1e;
      font-size: 13px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.93rem;
    }

    .msg.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2a2820;
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    /* Verse highlight */
    .verse-block {
      margin: 10px 0;
      padding: 12px 16px;
      background: #1c1810;
      border-left: 3px solid var(--gold-dim);
      border-radius: 0 8px 8px 0;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      color: #d4c89a;
      line-height: 1.6;
    }

    .verse-ref {
      display: block;
      font-style: normal;
      font-size: 0.78rem;
      color: var(--gold-dim);
      margin-top: 6px;
      font-family: var(--font-sans);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px 18px;
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--gold-dim); }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover  { background: #d4b05a; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--gold-dim); cursor: not-allowed; }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #0f0e0c;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .messages { padding: 16px 12px; }
      .input-area { padding: 12px; }
      .welcome h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="avatar">📖</div>
    <div class="header-info">
      <h1>Nicodemus</h1>
      <p>Seu guia nas Escrituras Sagradas</p>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✝️</div>
      <h2>Olá! Sou Nicodemus</h2>
      <p>Seu guia nas Escrituras Sagradas. Pergunte-me sobre versículos, personagens bíblicos, histórias ou ensinamentos.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Quem foi Nicodemos na Bíblia?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">O que diz João 3:16?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Me conte sobre Davi e Golias</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Versículos sobre esperança</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Qual o Salmo mais famoso?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Faça uma pergunta sobre a Bíblia..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const welcomeEl  = document.getElementById('welcome');

  let history = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, html) {
    welcomeEl.style.display = 'none';

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = role === 'bot' ? '📖' : '🙏';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = html;

    wrapper.appendChild(avatarEl);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typing-indicator';

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = '📖';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatarEl);
    wrapper.appendChild(typing);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatBotMessage(text) {
    // Detecta padrão [[Livro capítulo:versículo]] e formata como bloco de versículo
    let html = text
      .replace(/\[\[([^\]]+)\]\]/g, (_, ref) => {
        return `<span class="verse-ref">${ref}</span>`;
      });

    // Negrito simples
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Quebras de linha
    html = html.replace(/\n\n/g, '</p><p style="margin-top:10px">');
    html = html.replace(/\n/g, '<br>');

    return `<p>${html}</p>`;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);

    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        appendMessage('bot', formatBotMessage(data.reply));
        history.push({ role: 'assistant', content: data.reply });
      } else {
        appendMessage('bot', '<em>Ocorreu um erro. Tente novamente.</em>');
      }
    } catch (err) {
      removeTyping();
      appendMessage('bot', '<em>Não foi possível conectar. Verifique sua conexão.</em>');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
